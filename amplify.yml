version: 1
frontend:
  phases:
    preBuild:
      commands:
        - corepack enable
        - corepack prepare pnpm@latest --activate
        - pnpm install
    build:
      commands:
        - pnpm run build
        # https://docs.aws.amazon.com/amplify/latest/userguide/ssr-environment-variables.html
        - touch .env.production
        - env | grep -e AUTH_ >> .env.production
        - env | grep -e DATABASE_ >> .env.production
  artifacts:
    baseDirectory: .next # or dist, out, etc.
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .pnpm-store/**/*
