<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 200px;
            padding: 16px;
            font-family:
                -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial,
                sans-serif;
            font-size: 14px;
            color: #1f2328;
            background: #fff;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
        }
        .header h1 {
            font-size: 16px;
            font-weight: 600;
        }
        .row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .label {
            font-size: 14px;
            font-weight: 500;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 36px;
            height: 20px;
            flex-shrink: 0;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            inset: 0;
            background: #d0d7de;
            border-radius: 20px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .slider::before {
            content: "";
            position: absolute;
            width: 16px;
            height: 16px;
            left: 2px;
            bottom: 2px;
            background: #fff;
            border-radius: 50%;
            transition: transform 0.2s;
        }
        .switch input:checked + .slider {
            background: #0969da;
        }
        .switch input:checked + .slider::before {
            transform: translateX(16px);
        }
        .field {
            margin-top: 14px;
        }
        .field .label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 4px;
            color: #656d76;
        }
        .field input {
            width: 100%;
            padding: 6px 8px;
            font-size: 13px;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            outline: none;
            box-sizing: border-box;
        }
        .field input:focus {
            border-color: #0969da;
            box-shadow: 0 0 0 2px #0969da33;
        }
        #status {
            font-size: 12px;
            color: #656d76;
            margin-top: 12px;
            text-align: center;
        }
        </style>
    </head>
    <body>
        <div class="header">
            <h1>Neosrc</h1>
        </div>
        <div class="row">
            <span class="label">Auto-redirect</span>
            <label class="switch">
                <input type="checkbox" id="toggle">
                <span class="slider"></span>
            </label>
        </div>
        <div id="status">Enabled — redirecting PRs to Neosrc</div>
        <div class="field">
            <label class="label" for="neosrcUrl">Neosrc URL</label>
            <input type="text" id="neosrcUrl">
        </div>
        <script src="popup.js"></script>
    </body>
</html>
